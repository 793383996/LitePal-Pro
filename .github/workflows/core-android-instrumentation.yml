name: Core Android Instrumentation

on:
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core-android-instrumentation.yml"
  workflow_dispatch:

jobs:
  android-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify Java and Gradle runtime
        run: |
          java -version
          ./gradlew -version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run core connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew :core:connectedDebugAndroidTest --stacktrace
