name: Core PR Gate

on:
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core-pr-gate.yml"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradle.properties"
  push:
    branches:
      - main
      - master
    paths:
      - "core/**"
      - ".github/workflows/core-pr-gate.yml"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradle.properties"

jobs:
  verify-core:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Core compile, lint, unit tests, publish dry-run
        run: |
          ./gradlew \
            :core:assembleDebug \
            :core:lint \
            :core:testDebugUnitTest \
            :core:publishReleasePublicationToMavenLocal \
            --stacktrace
