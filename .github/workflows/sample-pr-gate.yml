name: Sample PR Gate

on:
  pull_request:
    paths:
      - "sample/**"
      - "sample-test/**"
      - ".github/workflows/sample-pr-gate.yml"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradle.properties"
  push:
    branches:
      - main
      - master
    paths:
      - "sample/**"
      - "sample-test/**"
      - ".github/workflows/sample-pr-gate.yml"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradle.properties"

jobs:
  verify-sample:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify Java and Gradle runtime
        run: |
          java -version
          ./gradlew -version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run full sample instrumentation suites
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew sampleTestAll --stacktrace
