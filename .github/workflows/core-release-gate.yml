name: Core Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "core-v*"

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Release parity, tests, assemble and publication validation
        run: |
          ./gradlew \
            :compiler-common:test \
            :core:testDebugUnitTest \
            verifyGeneratedOnlyRuntimeGuards \
            verifyKspKaptGeneratedParity \
            verifyProcessorNegativeCases \
            :core:verifyReleasePublishCredentials \
            :core:assembleRelease \
            :core:generatePomFileForReleasePublication \
            :core:signReleasePublication \
            :core:publishReleasePublicationToMavenLocal \
            --stacktrace
